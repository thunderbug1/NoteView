    <rect x="52" y="160" width="268" height="8" rx="4" fill="#565f89"/>
    <rect x="52" y="192" width="180" height="8" rx="4" fill="#565f89"/>
    <rect x="52" y="224" width="240" height="8" rx="4" fill="#565f89"/>
