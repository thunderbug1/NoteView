<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoteView</title>
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1b26">
    <link rel="apple-touch-icon" href="icon.svg">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/editor.css">
    <link rel="stylesheet" href="css/views/document.css">
    <link rel="stylesheet" href="css/views/timeline.css">
    <link rel="stylesheet" href="css/views/kanban.css">
    <link rel="stylesheet" href="css/views/history.css">
    <link rel="stylesheet" href="css/views/settings.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <!-- Sidebar -->
        <aside id="sidebar">
            <div class="app-header">
                <h1>NoteView</h1>
                <div class="header-actions">
                    <!-- Undo/Redo controls -->
                    <div class="undo-redo-controls">
                        <button id="undoBtn" class="icon-btn" title="Undo [Ctrl+Z]" disabled>
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M3 7v6h6"></path>
                                <path d="M21 17a9 9 0 00-9-9 9 9 0 00-6 2.3L3 13"></path>
                            </svg>
                        </button>
                        <button id="redoBtn" class="icon-btn" title="Redo [Ctrl+Y]" disabled>
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M21 7v6h-6"></path>
                                <path d="M3 17a9 9 0 019-9 9 9 0 016 2.3l3 2.7"></path>
                            </svg>
                        </button>
                    </div>
                    <button id="themeToggleBtn" class="theme-toggle" title="Toggle Dark/Light Mode">
                        <span class="sun-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg></span>
                        <span class="moon-icon" style="display: none;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg></span>
                    </button>
                </div>
            </div>

            <!-- View Selector -->
            <div class="sidebar-section">
                <div class="section-header">
                    <h3>View</h3>
                </div>
                <div class="tag-radio-group" id="viewSelectTags">
                    <div class="tag-radio-option selected" data-group="view" data-tag="document">
                        <span class="tag-badge">Document</span>
                    </div>
                    <div class="tag-radio-option" data-group="view" data-tag="timeline">
                        <span class="tag-badge">Timeline</span>
                    </div>
                    <div class="tag-radio-option" data-group="view" data-tag="kanban">
                        <span class="tag-badge">Kanban</span>
                    </div>
                </div>
            </div>

            <!-- Search -->
            <div class="sidebar-section">
                <div class="section-header">
                    <h3>Search</h3>
                </div>
                <div class="search">
                    <input type="text" id="searchInput" placeholder="Search blocks...">
                </div>
            </div>

            <div class="sidebar-section" id="sortSidebarSection">
                <div class="section-header">
                    <h3>Sort</h3>
                </div>
                <div class="sort-sidebar-panel">
                    <button id="openSortConfigBtn" class="sort-toolbar-button">Configure</button>
                </div>
            </div>

            <!-- Tag Groups -->
            <div class="sidebar-section">
                <!-- Time Group -->
                <div class="tag-group">
                    <div class="section-header">
                        <h3>Time</h3>
                    </div>
                    <div class="tag-radio-group" id="timeTags">
                        <div class="tag-radio-option selected" data-group="time" data-tag="">
                            <span class="tag-badge">All</span>
                        </div>
                        <div class="tag-radio-option" data-group="time" data-tag="today">
                            <span class="tag-badge">Today</span>
                        </div>
                        <div class="tag-radio-option" data-group="time" data-tag="thisWeek">
                            <span class="tag-badge">This Week</span>
                        </div>
                        <div class="tag-radio-option" data-group="time" data-tag="thisMonth">
                            <span class="tag-badge">This Month</span>
                        </div>
                    </div>
                </div>

                <!-- Tags Group -->
                <div class="tag-group" id="contextTagGroup">
                    <div class="section-header">
                        <h3>Tags</h3>
                    </div>
                    <div class="tag-radio-group" id="contextTags"></div>
                </div>

                <!-- Computed Tags Group -->
                <div class="tag-group" id="computedTagGroup">
                    <div class="section-header">
                        <h3>Computed Tags</h3>
                    </div>
                    <div class="tag-radio-group" id="computedTags">
                        <div class="tag-radio-option" data-group="context" data-tag="allTodos">
                            <span class="tag-badge">All Todos</span>
                        </div>
                        <div class="tag-radio-option" data-group="context" data-tag="openTodos">
                            <span class="tag-badge">Open Todos</span>
                        </div>
                        <div class="tag-radio-option" data-group="context" data-tag="blockedTodos">
                            <span class="tag-badge">Blocked Todos</span>
                        </div>
                        <div class="tag-radio-option" data-group="context" data-tag="unblockedTodos">
                            <span class="tag-badge">Unblocked Todos</span>
                        </div>
                        <div class="tag-radio-option" data-group="context" data-tag="untagged">
                            <span class="tag-badge">Untagged</span>
                        </div>
                        <div class="tag-radio-option" data-group="context" data-tag="unassigned">
                            <span class="tag-badge">Unassigned</span>
                        </div>
                    </div>
                </div>

                <!-- Contacts Group -->
                <div class="tag-group" id="contactTagGroup">
                    <div class="section-header">
                        <h3>People</h3>
                    </div>
                    <div class="tag-radio-group" id="contactTags">
                        <!-- Populated dynamically -->
                    </div>
                </div>
            </div>

            <!-- Settings -->
            <div class="sidebar-footer">
                <div class="tag-radio-option" data-group="view" data-tag="settings" title="Settings">
                    <span class="tag-badge settings-badge">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="3"></circle>
                            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                        </svg>
                        <span>Settings</span>
                    </span>
                </div>
            </div>
        </aside>

        <div id="sidebarOverlay"></div>

        <!-- Main Content -->
        <main id="main">
            <div id="viewContainer"></div>
        </main>
    </div>

    <!-- Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://unpkg.com/isomorphic-git@1.24.5/index.umd.min.js"></script>

    <!-- CodeMirror 6 for Live Preview Markdown Editing -->
    <script type="module">
        import {EditorView, basicSetup} from "https://esm.sh/codemirror";
        import {markdown} from "https://esm.sh/@codemirror/lang-markdown";
        import {languages} from "https://esm.sh/@codemirror/language-data";
        import {ViewPlugin, Decoration, WidgetType, keymap, placeholder} from "https://esm.sh/@codemirror/view@6";
        import {EditorState, StateField, Prec} from "https://esm.sh/@codemirror/state@6";
        import {unifiedMergeView} from "https://esm.sh/@codemirror/merge@6";
        import {indentWithTab} from "https://esm.sh/@codemirror/commands@6";
        import {autocompletion, completionKeymap, closeBracketsKeymap} from "https://esm.sh/@codemirror/autocomplete@6";

        // Export to global scope for use in document.js
        window.CodeMirror = {
            EditorView,
            basicSetup,
            Prec,
            keymap,
            markdown,
            languages,
            ViewPlugin,
            Decoration,
            WidgetType,
            StateField,
            unifiedMergeView,
            indentWithTab,
            placeholder,
            EditorState,
            autocompletion,
            completionKeymap,
            closeBracketsKeymap
        };

        // Signal when CodeMirror is ready
        window.CodeMirrorReady = true;
        window.dispatchEvent(new Event('CodeMirrorReady'));
    </script>

    <!-- App Scripts -->
    <script src="js/gitFs.js"></script>
    <script src="js/gitStore.js"></script>
    <script src="js/gitRemote.js"></script>

    <!-- Utilities -->
    <script src="js/utils/common.js"></script>
    <script src="js/utils/performance.js"></script>
    <script src="js/utils/modal.js"></script>
    <script src="js/utils/taskParser.js"></script>
    <script src="js/utils/timeFilter.js"></script>
    <script src="js/utils/contactHelper.js"></script>
    <script src="js/utils/cacheManager.js"></script>

    <script src="js/undoRedoManager.js?v=5"></script>
    <script src="js/store.js?v=8"></script>
    <script src="js/utils/sortManager.js"></script>
    <script src="js/selectionManager.js?v=2"></script>
    <script src="js/widgets/codeMirrorWidgets.js"></script>
    <script src="js/menus/taskMenus.js"></script>
    <script src="js/views/history.js"></script>
    <script src="js/views/document.js?v=4"></script>
    <script src="js/views/timeline.js?v=3"></script>
    <script src="js/views/kanban.js?v=3"></script>
    <script src="js/views/settings.js"></script>

    <script src="js/main.js?v=7"></script>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js?v=2');
        }
    </script>

    <!-- Floating Action Button -->
    <button id="fabNewNote" class="fab" title="New Note">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
    </button>
</body>
</html>
